<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#07070c"/>
  
  <!-- Subtle Grid Lines -->
  <line x1="8" y1="0" x2="8" y2="32" stroke="#1c1c24" stroke-width="0.5"/>
  <line x1="16" y1="0" x2="16" y2="32" stroke="#1c1c24" stroke-width="0.5"/>
  <line x1="24" y1="0" x2="24" y2="32" stroke="#1c1c24" stroke-width="0.5"/>
  <line x1="0" y1="8" x2="32" y2="8" stroke="#1c1c24" stroke-width="0.5"/>
  <line x1="0" y1="16" x2="32" y2="16" stroke="#1c1c24" stroke-width="0.5"/>
  <line x1="0" y1="24" x2="32" y2="24" stroke="#1c1c24" stroke-width="0.5"/>

  <!-- The "Track C" diagnostic loop / letter C -->
  <path d="M 22 8 
           C 12 8, 8 12, 8 16 
           C 8 20, 12 24, 22 24" 
        fill="none" 
        stroke="#5fa324" 
        stroke-width="3" 
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- The "Wall" (Bottleneck) Indicator -->
  <rect x="20" y="6" width="3" height="7" rx="1.5" fill="#4fd6e6"/>
  <rect x="20" y="19" width="3" height="7" rx="1.5" fill="#8b8bff"/>
  
  <!-- Diagnostic crosshair or dot -->
  <circle cx="16" cy="16" r="2.5" fill="#5fa324"/>
  <circle cx="16" cy="16" r="1" fill="#ffffff"/>
</svg>
