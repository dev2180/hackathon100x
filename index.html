<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hackathon 100x</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 3rem 4rem;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 16px;
      border: 1px solid #00d4ff33;
      box-shadow: 0 0 40px #00d4ff22;
    }
    h1 { font-size: 3rem; color: #00d4ff; letter-spacing: 2px; }
    p  { margin-top: 1rem; color: #aaa; font-size: 1.1rem; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.4rem 1rem;
      background: #00d4ff22;
      border: 1px solid #00d4ff66;
      border-radius: 999px;
      color: #00d4ff;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 Hackathon 100x</h1>
    <p>Build fast. Ship faster.</p>
    <span class="badge">v1.0 — live</span>
  </div>
</body>
</html>
